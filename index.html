<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC Inventory System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class', // Enable dark mode
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { teal: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                    }
                }
            }
        }
    </script>
    
    <!-- Theme Initialization Script (Prevents flash of wrong theme) -->
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            color: #1e293b; 
            /* Dynamic Gradients applied via Tailwind classes below, but fallback here */
            background-color: #FAFAFA;
        }
        
        /* Dark mode text color override */
        html.dark body { color: #f8fafc; }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .loader { border: 3px solid rgba(20, 184, 166, 0.2); border-radius: 50%; border-top: 3px solid #0d9488; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        html.dark ::-webkit-scrollbar-thumb { background: #475569; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Glassmorphism utilities */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        html.dark .glass { background: rgba(15, 23, 42, 0.7); }
        
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        html.dark .glass-card { background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<!-- Dynamic Gradient Background on Body -->
<body class="selection:bg-teal-200 selection:text-teal-900 dark:selection:bg-teal-900 dark:selection:text-teal-100 overflow-x-hidden min-h-screen bg-gradient-to-br from-slate-50 via-teal-50 to-sky-50 dark:from-slate-950 dark:via-teal-950 dark:to-slate-900 animate-gradient-x transition-colors duration-500">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="loader mb-4" style="width: 48px; height: 48px; border-width: 4px;"></div>
        <p class="text-teal-700 dark:text-teal-400 font-semibold tracking-wide animate-pulse">Initializing STC Inventory...</p>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[90] flex flex-col gap-3"></div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md z-50 hidden items-center justify-center p-4 transition-all duration-300">
        <div class="glass-card rounded-3xl shadow-2xl w-full max-w-md overflow-hidden relative transform transition-all scale-95 opacity-0" id="modal-content-wrapper">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Main Application Container -->
    <div id="app" class="min-h-screen hidden flex-col relative z-10">
        <!-- Topbar -->
        <header id="topbar" class="glass border-b border-gray-200/50 dark:border-slate-800/50 sticky top-0 z-40 hidden flex-shrink-0 transition-colors duration-300"></header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 w-full flex flex-col"></main>

        <!-- Footer -->
        <footer id="footer" class="glass border-t border-gray-200/50 dark:border-slate-800/50 mt-auto hidden flex-shrink-0 w-full transition-colors duration-300"></footer>
    </div>

    <!-- FIREBASE & APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyC_wUADXYBdL7dDONMDOWxICsZNPZ8HP50",
            authDomain: "inventory-1104c.firebaseapp.com",
            projectId: "inventory-1104c",
            storageBucket: "inventory-1104c.firebasestorage.app",
            messagingSenderId: "362257720209",
            appId: "1:362257720209:web:e15b20233db3758380b030",
            measurementId: "G-P9FMEDB086"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const getPath = (col) => `artifacts/${appId}/public/data/${col}`;

        // --- CONSTANTS & STATE ---
        const CUPBOARDS = [
            { id: 'TL', name: 'TL Cupboard', desc: 'Tinkerer\'s Lab equipment', logo: 'TL.png', color: '0f766e' },
            { id: 'RnA', name: 'RnA Cupboard', desc: 'Robotics & Automation', logo: 'RnA.jpg', color: '0369a1' },
            { id: 'TP', name: 'TP Cupboard', desc: 'Tech Pro hardware', logo: 'TP.png', color: '6d28d9' },
            { id: 'Common', name: 'Common Cupboard', desc: 'General purpose items', logo: 'Common.jpg', color: '374151' },
        ];

        let state = {
            user: null,
            profile: null,
            inventory: [],
            transactions: [],
            users: [], 
            keys: [], 
            currentView: 'auth', 
            adminTab: 'dashboard',
            filterCupboard: 'All',
            searchQuery: '',
            isLoginMode: true 
        };

        let unsubscribes = [];

        // --- UTILS ---
        window.toggleTheme = () => {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            lucide.createIcons();
            renderTopbar(); // Re-render to swap icons correctly
        };

        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            // Updated toast styling for dynamic themes
            toast.className = `px-5 py-3.5 rounded-2xl shadow-xl text-sm font-medium flex items-center gap-3 slide-in border backdrop-blur-md ${type === 'error' ? 'bg-red-500/90 border-red-400 text-white dark:bg-red-900/90 dark:border-red-800' : 'bg-slate-800/90 border-slate-700 text-white dark:bg-white/90 dark:border-gray-200 dark:text-slate-900'}`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle-2'}" class="w-5 h-5 ${type === 'error' ? '' : 'text-teal-400 dark:text-teal-600'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)'; toast.style.transition = 'all 0.4s ease'; setTimeout(() => toast.remove(), 400); }, 3500);
        };

        const toggleLoading = (show) => {
            const el = document.getElementById('loading-overlay');
            if (show) {
                el.style.display = 'flex';
                setTimeout(() => el.style.opacity = '1', 10);
            } else {
                el.style.opacity = '0';
                setTimeout(() => el.style.display = 'none', 300);
            }
        };

        const openModal = (htmlContent) => {
            const overlay = document.getElementById('modal-overlay');
            const wrapper = document.getElementById('modal-content-wrapper');
            document.getElementById('modal-content').innerHTML = htmlContent;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            // Animation trick
            setTimeout(() => {
                wrapper.classList.remove('scale-95', 'opacity-0');
                wrapper.classList.add('scale-100', 'opacity-100');
            }, 10);
            lucide.createIcons();
        };

        const closeModal = () => {
            const overlay = document.getElementById('modal-overlay');
            const wrapper = document.getElementById('modal-content-wrapper');
            
            wrapper.classList.remove('scale-100', 'opacity-100');
            wrapper.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }, 300); // Wait for transition
        };
        window.closeModal = closeModal;

        // --- ROUTING LOGIC ---
        function handleHashChange() {
            const hash = window.location.hash.replace('#', '') || 'auth';
            
            if (hash === 'admin' && (!state.profile || !['admin', 'master_admin'].includes(state.profile.role))) {
                showToast("Access Denied: Admins only", "error");
                window.location.hash = 'home';
                return;
            }

            if (['home', 'inventory', 'admin', 'history', 'keys'].includes(hash) && !state.profile) {
                window.location.hash = 'auth';
                return;
            }

            if (['home', 'inventory', 'admin', 'history', 'keys', 'auth'].includes(hash)) {
                state.currentView = hash;
            } else {
                state.currentView = state.profile ? 'home' : 'auth';
            }
            renderApp();
        }

        // --- FIREBASE INITIALIZATION & LISTENERS ---
        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.warn("Initial background auth skipped.");
                toggleLoading(false);
            }

            onAuthStateChanged(auth, async (currentUser) => {
                state.user = currentUser;
                
                if (!currentUser || currentUser.isAnonymous) {
                    state.profile = null;
                    cleanupListeners();
                    window.location.hash = 'auth';
                    handleHashChange();
                    toggleLoading(false);
                    return;
                }

                try {
                    const docRef = doc(db, getPath('users'), currentUser.uid);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        state.profile = { id: snap.id, ...snap.data() };
                        setupListeners();
                        if (!window.location.hash || window.location.hash === '#auth') {
                            window.location.hash = 'home';
                        } else {
                            handleHashChange();
                        }
                    } else {
                        state.profile = null;
                        window.location.hash = 'auth';
                        handleHashChange();
                    }
                } catch (e) {
                    console.error("Profile fetch error", e);
                } finally {
                    toggleLoading(false);
                }
            });
        }

        function setupListeners() {
            cleanupListeners();
            if (!state.user) return;

            unsubscribes.push(onSnapshot(collection(db, getPath('inventory')), 
                (snap) => { state.inventory = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderMainContent(); }
            ));

            unsubscribes.push(onSnapshot(collection(db, getPath('transactions')), 
                (snap) => { state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderMainContent(); }
            ));

            unsubscribes.push(onSnapshot(collection(db, getPath('keys')), 
                (snap) => { state.keys = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderMainContent(); }
            ));

            if (['admin', 'master_admin'].includes(state.profile.role)) {
                unsubscribes.push(onSnapshot(collection(db, getPath('users')), 
                    (snap) => { state.users = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderMainContent(); }
                ));
            }
        }

        function cleanupListeners() {
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];
        }

        // --- GLOBAL ACTIONS ---
        window.switchView = (view, cupboardId = 'All') => {
            if (view === 'inventory') {
                state.filterCupboard = cupboardId;
                state.searchQuery = '';
            }
            window.location.hash = view; 
        };

        window.switchAdminTab = (tab) => {
            state.adminTab = tab;
            renderApp();
        };

        window.logout = async () => {
            try {
                await signOut(auth);
                state.profile = null;
                cleanupListeners();
                window.location.hash = 'auth';
                showToast("Logged out successfully");
            } catch (err) {
                showToast("Error signing out", "error");
            }
        };

        // --- RENDER FUNCTIONS ---
        function renderApp() {
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            app.classList.add('flex');

            if (!state.profile || state.currentView === 'auth') {
                document.getElementById('topbar').classList.add('hidden');
                document.getElementById('footer').classList.add('hidden');
                renderAuth();
            } else {
                document.getElementById('topbar').classList.remove('hidden');
                document.getElementById('footer').classList.remove('hidden');
                renderTopbar();
                renderMainContent();
                renderFooter();
            }
            lucide.createIcons();
        }

        function renderTopbar() {
            const topbar = document.getElementById('topbar');
            let adminSwitchHtml = '';
            const isDark = document.documentElement.classList.contains('dark');
            
            if (['admin', 'master_admin'].includes(state.profile.role)) {
                adminSwitchHtml = `
                    <div class="flex bg-slate-100/50 dark:bg-slate-800/50 p-1 rounded-xl mr-2 sm:mr-4 border border-slate-200/50 dark:border-slate-700/50 backdrop-blur-sm">
                        <button onclick="switchView('home')" class="px-3 py-1.5 text-sm font-medium rounded-lg transition-all duration-300 ${state.currentView !== 'admin' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-700/50'}">Student</button>
                        <button onclick="switchView('admin')" class="px-3 py-1.5 text-sm font-medium rounded-lg transition-all duration-300 ${state.currentView === 'admin' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-700/50'}">Admin</button>
                    </div>
                `;
            }

            topbar.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                    <div class="flex items-center gap-3 cursor-pointer group" onclick="switchView('home')">
                        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-teal-500 to-teal-700 flex items-center justify-center shadow-md group-hover:shadow-lg group-hover:scale-105 transition-all duration-300">
                            <i data-lucide="box" class="w-5 h-5 text-white"></i>
                        </div>
                        <h1 class="text-xl font-bold text-slate-800 dark:text-white tracking-tight hidden sm:block group-hover:text-teal-600 dark:group-hover:text-teal-400 transition-colors">STC Inventory</h1>
                    </div>
                    
                    <div class="flex items-center overflow-x-auto no-scrollbar py-1">
                        ${adminSwitchHtml}
                        
                        <button onclick="switchView('keys')" class="flex items-center gap-2 text-sm font-medium transition-all duration-300 mr-2 sm:mr-3 px-3 py-2 rounded-xl ${state.currentView === 'keys' ? 'bg-amber-100/80 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400' : 'bg-slate-50/50 text-slate-600 hover:bg-amber-50 hover:text-amber-600 dark:bg-slate-800/50 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-amber-400'} border border-slate-200/50 dark:border-slate-700/50">
                            <i data-lucide="key" class="w-4 h-4"></i> <span class="hidden md:block">Keys</span>
                        </button>
                        
                        <button onclick="switchView('history')" class="flex items-center gap-2 text-sm font-medium transition-all duration-300 mr-2 sm:mr-4 px-3 py-2 rounded-xl ${state.currentView === 'history' ? 'bg-teal-100/80 text-teal-700 dark:bg-teal-500/20 dark:text-teal-400' : 'bg-slate-50/50 text-slate-600 hover:bg-teal-50 hover:text-teal-600 dark:bg-slate-800/50 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-teal-400'} border border-slate-200/50 dark:border-slate-700/50">
                            <i data-lucide="history" class="w-4 h-4"></i> <span class="hidden md:block">History</span>
                        </button>

                        <div class="flex items-center gap-2 sm:gap-3 pl-2 sm:pl-4 border-l border-slate-200 dark:border-slate-700 flex-shrink-0">
                            <!-- Theme Toggle -->
                            <button onclick="toggleTheme()" class="p-2 text-slate-500 hover:text-amber-500 dark:text-slate-400 dark:hover:text-amber-300 transition-all duration-300 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800" title="Toggle Theme">
                                ${isDark ? '<i data-lucide="sun" class="w-5 h-5"></i>' : '<i data-lucide="moon" class="w-5 h-5"></i>'}
                            </button>

                            <!-- Clickable Profile -->
                            <button onclick="openProfileModal()" class="flex items-center gap-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:text-teal-600 dark:hover:text-teal-400 transition-all duration-300 bg-white/50 dark:bg-slate-800/50 hover:bg-white dark:hover:bg-slate-700 px-2.5 py-1.5 rounded-xl border border-slate-200/50 dark:border-slate-700/50 shadow-sm" title="Edit Profile">
                                <div class="w-7 h-7 rounded-full bg-teal-100 dark:bg-teal-900/50 text-teal-700 dark:text-teal-300 flex items-center justify-center border border-teal-200 dark:border-teal-800">
                                    ${state.profile.name ? state.profile.name.charAt(0).toUpperCase() : 'U'}
                                </div>
                                <span class="hidden lg:block truncate max-w-[100px]">${state.profile.name}</span>
                            </button>
                            
                            <button onclick="logout()" class="text-slate-400 hover:text-red-500 dark:text-slate-500 dark:hover:text-red-400 transition-colors p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20" title="Logout">
                                <i data-lucide="log-out" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFooter() {
            const footer = document.getElementById('footer');
            footer.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <p class="text-sm text-slate-500 dark:text-slate-400 flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-4 h-4 text-teal-600 dark:text-teal-500"></i> STC Inventory System
                    </p>
                    <a href="https://wa.me/917050342098" target="_blank" class="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-[#25D366] to-[#1DA851] hover:from-[#128C7E] hover:to-[#128C7E] text-white text-sm font-medium rounded-full transition-all duration-300 shadow-md hover:shadow-lg focus:ring-2 focus:ring-offset-2 focus:ring-[#25D366] dark:focus:ring-offset-slate-900 hover:-translate-y-0.5 active:translate-y-0">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.305-.885-.653-1.482-1.459-1.656-1.758-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.422-.272.347-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                        WhatsApp Support
                    </a>
                </div>
            `;
        }

        function renderMainContent() {
            const main = document.getElementById('main-content');
            if (!state.profile) return; 

            if (state.currentView === 'home') {
                main.innerHTML = getStudentHomeHTML();
            } else if (state.currentView === 'inventory') {
                main.innerHTML = getInventoryTableHTML();
                attachInventoryListeners();
            } else if (state.currentView === 'history') {
                main.innerHTML = getUserHistoryHTML();
            } else if (state.currentView === 'keys') {
                main.innerHTML = getKeysHTML();
            } else if (state.currentView === 'admin' && ['admin', 'master_admin'].includes(state.profile.role)) {
                main.innerHTML = getAdminDashboardHTML();
            }
            lucide.createIcons();
        }

        // --- AUTH LOGIC ---
        window.toggleAuthMode = () => {
            state.isLoginMode = !state.isLoginMode;
            renderAuth();
        };

        window.submitAuth = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('auth-submit-btn');
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            if (!state.isLoginMode && !email.toLowerCase().endsWith('@iitp.ac.in')) {
                showToast("Please use your official @iitp.ac.in email address", "error");
                return;
            }

            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white border-t-transparent"></div>`;
            btn.disabled = true;

            try {
                if (state.isLoginMode) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    state.user = userCredential.user;
                    const docRef = doc(db, getPath('users'), state.user.uid);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        state.profile = { id: snap.id, ...snap.data() };
                        showToast(`Welcome back, ${state.profile.name}!`);
                        window.location.hash = 'home';
                        setupListeners();
                    } else {
                        showToast("Profile data not found. Please contact admin.", "error");
                        await signOut(auth);
                    }
                } else {
                    const name = document.getElementById('auth-name').value;
                    const rollNo = document.getElementById('auth-rollno').value;
                    const phone = document.getElementById('auth-phone').value;
                    
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    state.user = userCredential.user;
                    
                    const newUserProfile = { 
                        email, name, rollNo, phone,
                        role: 'user', clubs: [] 
                    };
                    await setDoc(doc(db, getPath('users'), state.user.uid), newUserProfile);
                    
                    state.profile = { id: state.user.uid, ...newUserProfile };
                    showToast("Account created successfully!");
                    window.location.hash = 'home';
                    setupListeners();
                }
            } catch (err) {
                let errMsg = err.message;
                if (['auth/invalid-credential', 'auth/user-not-found', 'auth/wrong-password'].includes(err.code)) errMsg = "Invalid email or password";
                else if (err.code === 'auth/email-already-in-use') errMsg = "Email is already in use";
                else if (err.code === 'auth/weak-password') errMsg = "Password is too weak (min 6 chars)";
                
                showToast(errMsg, "error");
                btn.innerHTML = state.isLoginMode ? 'Login to Dashboard' : 'Create Account';
                btn.disabled = false;
            }
        };

        window.saveProfile = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            const newName = document.getElementById('editProfileName').value;
            const newPhone = document.getElementById('editProfilePhone').value;
            const newPassword = document.getElementById('editProfilePassword').value;

            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white border-t-transparent"></div>`;
            btn.disabled = true;

            try {
                await updateDoc(doc(db, getPath('users'), state.profile.id), {
                    name: newName,
                    phone: newPhone
                });

                if (newPassword) {
                    await updatePassword(auth.currentUser, newPassword);
                }

                state.profile.name = newName;
                state.profile.phone = newPhone;
                renderTopbar();
                lucide.createIcons();
                showToast("Profile updated successfully!");
                closeModal();
            } catch (err) {
                console.error("Profile update error", err);
                let errMsg = "Error updating profile.";

                    errMsg = "Changing your password requires a recent login. Please log out and back in.";

                btn.disabled = false;

                                <div><p class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Issued</p><h3 class="text-4xl font-extrabold text-slate-900 dark:text-white">${issuedItems}</h3></div>
                                <div class="w-14 h-14 rounded-2xl bg-purple-50 dark:bg-purple-500/10 text-purple-600 dark:text-purple-400 flex items-center justify-center border border-purple-100 dark:border-purple-500/20 shadow-inner"><i data-lucide="shopping-cart" class="w-7 h-7"></i></div>
                            </div>
                            <div class="glass-card rounded-3xl p-6 shadow-lg flex items-center justify-between border border-white/50 dark:border-slate-700/50">
                                <div><p class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Available</p><h3 class="text-4xl font-extrabold text-slate-900 dark:text-white">${availableItems}</h3></div>
                                <div class="w-14 h-14 rounded-2xl bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 flex items-center justify-center border border-emerald-100 dark:border-emerald-500/20 shadow-inner"><i data-lucide="check-circle-2" class="w-7 h-7"></i></div>
                            </div>
                        </div>
                        <div class="glass-card rounded-3xl shadow-xl p-6 border-l-4 border-l-amber-400 dark:border-l-amber-500">
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-5 flex justify-between items-center">
                                Action Required <span class="bg-amber-100 dark:bg-amber-500/20 text-amber-800 dark:text-amber-400 text-xs px-3 py-1 rounded-full font-bold border border-amber-200 dark:border-amber-500/30">${pendingTxs.length} pending</span>
                            </h3>
                            <div>${pendingHtml}</div>
                        </div>
                    </div>
                `;
            } else if (state.adminTab === 'inventory') {
                const invRows = adminInv.map(item => `
                    <tr class="hover:bg-slate-50/80 dark:hover:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-800 last:border-0">
                        <td class="px-6 py-4 text-sm font-bold text-slate-900 dark:text-white">${item.item_name}</td>
                        <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400"><span class="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-md text-xs font-semibold mr-2">${item.cupboard}</span><span class="text-xs opacity-70">${item.shelf || 'Shelf 1'}</span></td>
                        <td class="px-6 py-4 text-sm font-bold text-slate-900 dark:text-white">${item.available_quantity} <span class="text-slate-400 font-normal">/ ${item.total_quantity}</span></td>
                        <td class="px-6 py-4 text-right flex items-center justify-end gap-2">
                            <button onclick='openItemModal(${JSON.stringify(item)})' class="p-2 text-slate-500 hover:text-teal-600 dark:text-slate-400 dark:hover:text-teal-400 hover:bg-teal-50 dark:hover:bg-teal-500/10 rounded-lg transition-colors border border-transparent hover:border-teal-200 dark:hover:border-teal-500/20"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick='deleteItem("${item.id}")' class="p-2 text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors border border-transparent hover:border-red-200 dark:hover:border-red-500/20"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `).join('') || `<tr><td colSpan="4" class="text-center py-12 text-slate-500 dark:text-slate-400">No items in inventory.</td></tr>`;

                contentHtml = `
                    <div class="fade-in space-y-6">
                        <div class="flex items-center justify-between">
                            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Inventory</h2>
                            <button onclick="openItemModal(null)" class="flex items-center gap-2 bg-gradient-to-r from-teal-600 to-teal-500 hover:from-teal-700 hover:to-teal-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                                <i data-lucide="plus" class="w-4 h-4"></i> Add Item
                            </button>
                        </div>
                        <div class="glass-card rounded-3xl shadow-xl overflow-hidden border border-white/50 dark:border-slate-700/50">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead class="bg-slate-50/80 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700">
                                        <tr>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Item Name</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Location</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Qty (A/T)</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800 bg-white/40 dark:bg-slate-900/40">${invRows}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.adminTab === 'transactions') {
                const txRows = [...adminTx].sort((a,b) => b.timestamp - a.timestamp).map(tx => {
                    const timelineHtml = isMaster ? `
                        <div class="text-xs text-slate-500 dark:text-slate-400 flex flex-col gap-1 mt-2 border-t border-slate-100 dark:border-slate-700/50 pt-2">
                            <span class="flex items-center gap-1.5"><i data-lucide="clock" class="w-3 h-3 text-slate-400"></i><b class="text-slate-700 dark:text-slate-300 font-semibold">Req:</b> ${new Date(tx.timestamp).toLocaleString()}</span>
                            ${tx.approved_at ? `<span class="flex items-center gap-1.5"><i data-lucide="check-circle" class="w-3 h-3 text-emerald-400"></i><b class="text-slate-700 dark:text-slate-300 font-semibold">Appr:</b> ${tx.approved_by} (${new Date(tx.approved_at).toLocaleDateString()})</span>` : ''}
                            ${tx.rejected_at ? `<span class="flex items-center gap-1.5"><i data-lucide="x-circle" class="w-3 h-3 text-red-400"></i><b class="text-slate-700 dark:text-slate-300 font-semibold">Rej:</b> ${tx.rejected_by}</span>` : ''}
                            ${tx.returned_at ? `<span class="flex items-center gap-1.5"><i data-lucide="corner-down-left" class="w-3 h-3 text-blue-400"></i><b class="text-slate-700 dark:text-slate-300 font-semibold">Ret:</b> ${new Date(tx.returned_at).toLocaleDateString()}</span>` : ''}
                        </div>
                    ` : '';

                    return `
                    <tr class="hover:bg-slate-50/80 dark:hover:bg-slate-700/30 transition-colors align-top border-b border-slate-100 dark:border-slate-800 last:border-0">
                        <td class="px-6 py-5 text-sm text-slate-500 dark:text-slate-400">${new Date(tx.timestamp).toLocaleString()}</td>
                        <td class="px-6 py-5 text-sm">
                            <p class="font-bold text-slate-900 dark:text-white">${tx.user_name}</p>
                            ${isMaster ? `<p class="text-xs text-slate-500 dark:text-slate-400 mt-1 flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> ${tx.user_phone || 'N/A'}</p>` : ''}
                        </td>
                        <td class="px-6 py-5 text-sm text-slate-900 dark:text-white">
                            <p class="font-semibold"><span class="font-extrabold text-teal-600 dark:text-teal-400">${tx.quantity}x</span> ${tx.item_name}</p>
                            ${timelineHtml}
                        </td>
                        <td class="px-6 py-5">${getStatusBadge(tx.status)}</td>
                        <td class="px-6 py-5 text-right">
                            ${tx.status === 'pending_approval' ? `
                                <div class="flex justify-end gap-2">
                                    <button onclick='approveRequest(${JSON.stringify(tx)})' class="text-xs font-bold bg-emerald-50 text-emerald-600 hover:bg-emerald-100 dark:bg-emerald-500/10 dark:text-emerald-400 dark:hover:bg-emerald-500/20 border border-emerald-200 dark:border-emerald-500/20 px-3 py-1.5 rounded-lg transition-colors">Approve</button>
                                    <button onclick='rejectRequest(${JSON.stringify(tx)})' class="text-xs font-bold bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-500/10 dark:text-red-400 dark:hover:bg-red-500/20 border border-red-200 dark:border-red-500/20 px-3 py-1.5 rounded-lg transition-colors">Reject</button>
                                </div>
                            ` : ''}
                            ${tx.status === 'approved_issued' ? `<button onclick='returnItem("${tx.id}", "${tx.item_id}", ${tx.quantity})' class="text-xs font-bold text-teal-600 bg-teal-50 hover:bg-teal-100 dark:text-teal-400 dark:bg-teal-500/10 dark:hover:bg-teal-500/20 border border-teal-200 dark:border-teal-500/20 px-4 py-2 rounded-lg transition-colors">Mark Returned</button>` : ''}
                        </td>
                    </tr>
                `}).join('') || `<tr><td colSpan="5" class="text-center py-12 text-slate-500 dark:text-slate-400">No transactions recorded.</td></tr>`;

                contentHtml = `
                    <div class="fade-in space-y-6">
                        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Approvals & History</h2>
                        <div class="glass-card rounded-3xl shadow-xl overflow-hidden border border-white/50 dark:border-slate-700/50">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead class="bg-slate-50/80 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700">
                                        <tr>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Date</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">User Details</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Item Timeline</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Status</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800 bg-white/40 dark:bg-slate-900/40">${txRows}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.adminTab === 'users' && isMaster) {
                const userRows = state.users.map(u => {
                    const uClubs = u.clubs || (u.club ? [u.club] : []);
                    return `
                    <tr class="hover:bg-slate-50/80 dark:hover:bg-slate-700/30 transition-colors border-b border-slate-100 dark:border-slate-800 last:border-0">
                        <td class="px-6 py-5 text-sm font-bold text-slate-900 dark:text-white">${u.name}<br><span class="text-xs font-medium text-slate-500 dark:text-slate-400 mt-0.5 inline-block">${u.email}</span></td>
                        <td class="px-6 py-5 text-sm text-slate-600 dark:text-slate-400">
                            <p class="font-semibold">${u.rollNo || 'N/A'}</p>
                            <p class="text-xs mt-1 flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> ${u.phone || 'N/A'}</p>
                        </td>
                        <td class="px-6 py-5 text-sm">
                            <span class="px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm inline-block ${u.role === 'master_admin' ? 'bg-purple-50 dark:bg-purple-500/10 text-purple-700 dark:text-purple-400 border-purple-200 dark:border-purple-500/20' : (u.role === 'admin' ? 'bg-blue-50 dark:bg-blue-500/10 text-blue-700 dark:text-blue-400 border-blue-200 dark:border-blue-500/20' : 'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700')}">${u.role.replace('_', ' ').toUpperCase()}</span>
                        </td>
                        <td class="px-6 py-5 text-sm text-slate-600 dark:text-slate-400 font-medium">${u.role === 'admin' ? (uClubs.length > 0 ? uClubs.map(c=>`<span class="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded border border-slate-200 dark:border-slate-700 mr-1 text-xs">${c}</span>`).join('') : '-') : '-'}</td>
                        <td class="px-6 py-5 text-right">
                            <button onclick='openUserModal(${JSON.stringify(u)})' class="p-2 text-slate-500 hover:text-teal-600 dark:text-slate-400 dark:hover:text-teal-400 hover:bg-teal-50 dark:hover:bg-teal-500/10 rounded-lg transition-colors border border-transparent hover:border-teal-200 dark:hover:border-teal-500/20"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `}).join('') || `<tr><td colSpan="5" class="text-center py-12 text-slate-500 dark:text-slate-400">No users found.</td></tr>`;

                contentHtml = `
                    <div class="fade-in space-y-6">
                        <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">System Users</h2>
                        <div class="glass-card rounded-3xl shadow-xl overflow-hidden border border-white/50 dark:border-slate-700/50">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead class="bg-slate-50/80 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700">
                                        <tr>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">User Details</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">ID & Contact</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Role Level</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Admin Assignments</th>
                                            <th class="px-6 py-5 text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800 bg-white/40 dark:bg-slate-900/40">${userRows}</tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex flex-1 overflow-hidden fade-in h-full min-h-[calc(100vh-4rem)]">
                    <aside class="w-72 glass border-r border-slate-200/50 dark:border-slate-800/50 hidden md:flex flex-col flex-shrink-0 z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)] dark:shadow-none">
                        <div class="p-6">
                            <p class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-6 px-4">Admin Controls</p>
                            <nav class="space-y-2">${sidebarHtml}</nav>
                        </div>
                    </aside>
                    <div class="flex-1 overflow-y-auto p-6 lg:p-10 relative z-0">${contentHtml}</div>
                </div>
            `;
        }

        // --- ADMIN APPROVAL ACTIONS ---
        window.approveRequest = async (tx) => {
            const item = state.inventory.find(i => i.id === tx.item_id);
            if (!item || item.available_quantity < tx.quantity) {
                return showToast(`Not enough ${tx.item_name} in stock to approve!`, "error");
            }
            try {
                await updateDoc(doc(db, getPath('inventory'), tx.item_id), {
                    available_quantity: Number(item.available_quantity) - tx.quantity
                });
                await updateDoc(doc(db, getPath('transactions'), tx.id), {
                    status: 'approved_issued',
                    approved_by: state.profile.name,
                    approved_at: Date.now()
                });
                showToast("Request approved and item issued");
            } catch (e) { showToast("Error approving request", "error"); }
        };

        window.rejectRequest = async (tx) => {
            if(!confirm(`Reject request for ${tx.quantity}x ${tx.item_name}?`)) return;
            try {
                await updateDoc(doc(db, getPath('transactions'), tx.id), {
                    status: 'rejected',
                    rejected_by: state.profile.name,
                    rejected_at: Date.now()
                });
                showToast("Request rejected");
            } catch (e) { showToast("Error rejecting request", "error"); }
        };

        window.returnItem = async (txId, itemId, quantity) => {
            try {
                const item = state.inventory.find(i => i.id === itemId);
                if (item) {
                    await updateDoc(doc(db, getPath('inventory'), itemId), {
                        available_quantity: Number(item.available_quantity) + Number(quantity)
                    });
                }
                await updateDoc(doc(db, getPath('transactions'), txId), { 
                    status: 'returned',
                    returned_at: Date.now()
                });
                showToast("Item marked as returned");
            } catch (e) { showToast("Error returning item", "error"); }
        };

        // --- GENERAL ADMIN CRUD ---
        window.openItemModal = (item) => {
            const isEdit = !!item;
            const isMaster = state.profile.role === 'master_admin';
            let adminClubs = state.profile.clubs || (state.profile.club ? [state.profile.club] : []);
            
            const title = isEdit ? 'Edit Item' : 'Add New Item';
            const name = isEdit ? item.item_name : '';
            const cupboard = isEdit ? item.cupboard : (isMaster ? 'TL' : (adminClubs[0] || 'TL'));
            const shelf = isEdit ? (item.shelf || 'Shelf 1') : 'Shelf 1';
            const qty = isEdit ? item.total_quantity : 1;

            const opts = CUPBOARDS
                .filter(c => isMaster || adminClubs.includes(c.id))
                .map(c => `<option value="${c.id}" ${cupboard === c.id ? 'selected' : ''}>${c.name}</option>`)
                .join('');
            const shelfOpts = [1, 2, 3, 4].map(s => `<option value="Shelf ${s}" ${shelf === `Shelf ${s}` ? 'selected' : ''}>Shelf ${s}</option>`).join('');

            const html = `
                <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 rounded-t-3xl">
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white">${title}</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 dark:text-slate-500 dark:hover:text-slate-300 transition-colors bg-white dark:bg-slate-700 p-1.5 rounded-full shadow-sm border border-slate-100 dark:border-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-6 space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Item Name</label>
                        <input type="text" id="adminItemName" value="${name}" class="w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-teal-500/50 text-slate-900 dark:text-white transition-all" placeholder="e.g., Arduino Uno" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Cupboard</label>
                            <select id="adminItemCupboard" class="w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-teal-500/50 text-slate-900 dark:text-white transition-all cursor-pointer">${opts}</select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Shelf</label>
                            <select id="adminItemShelf" class="w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-teal-500/50 text-slate-900 dark:text-white transition-all cursor-pointer">${shelfOpts}</select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Total Quantity</label>
                        <input type="number" id="adminItemQty" min="1" value="${qty}" class="w-full px-4 py-2.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-teal-500/50 text-slate-900 dark:text-white font-bold transition-all" />
                    </div>
                    <button onclick='saveItem(${isEdit ? JSON.stringify(item) : null})' id="saveItemBtn" class="w-full mt-6 py-3 bg-gradient-to-r from-teal-600 to-teal-500 hover:from-teal-700 hover:to-teal-600 disabled:from-slate-400 disabled:to-slate-400 text-white font-bold rounded-xl transition-all shadow-md hover:shadow-lg flex justify-center items-center h-12 hover:-translate-y-0.5">
                        Save Item Configuration
                    </button>
                </div>
            `;
            openModal(html);
        };

        window.saveItem = async (existingItem) => {
            const name = document.getElementById('adminItemName').value;
            const cupboard = document.getElementById('adminItemCupboard').value;
            const shelf = document.getElementById('adminItemShelf').value;
            const qty = Number(document.getElementById('adminItemQty').value);
            const btn = document.getElementById('saveItemBtn');

            if (!name) return showToast("Item name is required", "error");
            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white border-t-transparent"></div>`;
            btn.disabled = true;

            try {
                if (!existingItem) {
                    await addDoc(collection(db, getPath('inventory')), {
                        item_name: name, cupboard: cupboard, shelf: shelf, total_quantity: qty, available_quantity: qty
                    });
                    showToast("Item added");
                } else {
                    const diff = qty - existingItem.total_quantity;
                    await updateDoc(doc(db, getPath('inventory'), existingItem.id), {
                        item_name: name, cupboard: cupboard, shelf: shelf, total_quantity: qty,
                        available_quantity: Number(existingItem.available_quantity) + diff
                    });
                    showToast("Item updated");
                }
                closeModal();
            } catch (e) {
                showToast("Error saving item", "error");
                btn.innerHTML = "Save Item Configuration";
                btn.disabled = false;
            }
        };

        window.deleteItem = async (id) => {
            if(!confirm("Are you sure you want to delete this item permanently?")) return;
            try {
                await deleteDoc(doc(db, getPath('inventory'), id));
                showToast("Item deleted");
            } catch (e) { showToast("Error deleting", "error"); }
        };

        window.openUserModal = (userObj) => {
            const role = userObj.role || 'user';
            const userClubs = userObj.clubs || (userObj.club ? [userObj.club] : []);
            
            const clubsCheckboxes = CUPBOARDS.map(c => `
                <label class="flex items-center gap-3 p-3 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer transition-colors shadow-sm">
                    <input type="checkbox" value="${c.id}" class="admin-club-checkbox w-4 h-4 text-teal-600 bg-slate-100 border-slate-300 rounded focus:ring-teal-500 dark:focus:ring-teal-600 dark:ring-offset-slate-800 focus:ring-2 dark:bg-slate-700 dark:border-slate-600" ${userClubs.includes(c.id) ? 'checked' : ''}>
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-300">${c.name}</span>
                </label>
            `).join('');

            const html = `
                <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 rounded-t-3xl">
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white">Edit User Permissions</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 dark:text-slate-500 dark:hover:text-slate-300 transition-colors bg-white dark:bg-slate-700 p-1.5 rounded-full shadow-sm border border-slate-100 dark:border-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="p-6 space-y-5">
                    <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-4 border border-slate-100 dark:border-slate-700 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-teal-100 dark:bg-teal-900/50 flex items-center justify-center text-teal-700 dark:text-teal-400 font-bold text-xl shrink-0 border border-teal-200 dark:border-teal-800/50">
                            ${userObj.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="truncate">
                            <p class="font-bold text-slate-900 dark:text-white truncate text-lg">${userObj.name}</p>
                            <p class="text-sm text-slate-500 dark:text-slate-400 truncate">${userObj.email}</p>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">System Role</label>
                        <select id="editUserRole" class="w-full px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-teal-500/50 text-slate-900 dark:text-white font-medium transition-all cursor-pointer" onchange="document.getElementById('editUserClubWrapper').style.display = this.value === 'admin' ? 'block' : 'none'">
                            <option value="user" ${role === 'user' ? 'selected' : ''}>Normal User</option>
                            <option value="admin" ${role === 'admin' ? 'selected' : ''}>Club Admin</option>
                            <option value="master_admin" ${role === 'master_admin' ? 'selected' : ''}>Master Admin</option>
                        </select>
                    </div>
                    <div id="editUserClubWrapper" class="pt-2" style="display: ${role === 'admin' ? 'block' : 'none'};">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Assign Admin Privileges to Clubs</label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${clubsCheckboxes}</div>
                    </div>
                    <button onclick='saveUserRole("${userObj.id}")' id="saveUserBtn" class="w-full mt-6 py-3 bg-gradient-to-r from-teal-600 to-teal-500 hover:from-teal-700 hover:to-teal-600 text-white font-bold rounded-xl transition-all shadow-md hover:shadow-lg flex justify-center items-center h-12 hover:-translate-y-0.5">
                        Save Permissions
                    </button>
                </div>
            `;
            openModal(html);
        };

        window.saveUserRole = async (userId) => {
            const newRole = document.getElementById('editUserRole').value;
            let newClubs = [];
            if (newRole === 'admin') {
                const checkboxes = document.querySelectorAll('.admin-club-checkbox:checked');
                newClubs = Array.from(checkboxes).map(cb => cb.value);
                if (newClubs.length === 0) return showToast("Select at least one club to assign", "error");
            }

            const btn = document.getElementById('saveUserBtn');
            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white border-t-transparent"></div>`;
            btn.disabled = true;

            try {
                await updateDoc(doc(db, getPath('users'), userId), {
                    role: newRole, clubs: newClubs, club: null
                });
                showToast("User permissions updated successfully!");
                closeModal();
            } catch (e) {
                showToast("Error updating permissions", "error");
                btn.innerHTML = "Save Permissions";
                btn.disabled = false;
            }
        };

        window.onload = () => {
            lucide.createIcons();
            window.addEventListener('hashchange', handleHashChange);
            init();
        };

    </script>
</body>
</html>
